name: Build, Release and Push Docker Image

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  # 原有：x86_64 架构 Windows/macOS/Ubuntu 可执行文件（完全保留不动）
  build-executables:
    name: Build Executable for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable
      run: |
        $separator = if ("${{ runner.os }}" -eq "Windows") {";"} else {":"}
        $addData = "--add-data `"templates${separator}templates`""
        $pyinstaller_command = "python -m PyInstaller --onefile --clean --noconfirm --name traffic_consumer_${{ runner.os }} --hidden-import=engineio.async_drivers.threading ${addData} traffic_consumer.py"
        if ("${{ runner.os }}" -eq "Windows") {
          $pyinstaller_command += " --hidden-import=win32timezone"
        }
        Invoke-Expression $pyinstaller_command
      shell: pwsh

    - name: Upload executable artifact
      uses: actions/upload-artifact@v4
      with:
        name: traffic_consumer_${{ runner.os }}
        path: dist/traffic_consumer_${{ runner.os }}${{ runner.os == 'Windows' && '.exe' || '' }}

  # 修复版：Linux AArch64 真架构打包（QEMU 容器原生编译）
  
    # 修复版：Linux AArch64 真架构打包（兼容Python3.12）
  build-executable-linux-arm64:
    name: Build Executable for Linux AArch64 (Android Compatible)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # 启用 QEMU 支持 arm64 模拟
    - name: Setup QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    # ARM64 容器内安装 Python3.12 + 打包
    - name: Build in ARM64 Ubuntu Container
      uses: addnab/docker-run-action@v3
      with:
        image: arm64v8/ubuntu:22.04
        options: --platform linux/arm64
        run: |
          apt-get update -y
          apt-get install -y software-properties-common
          # 加入 deadsnakes 源安装 Python3.12
          add-apt-repository ppa:deadsnakes/ppa -y
          apt-get update -y
          # 安装 Python3.12 及依赖
          apt-get install -y python3.12 python3.12-dev python3-pip git
          # 切换默认 python3 为 3.12
          ln -sf /usr/bin/python3.12 /usr/bin/python3
          ln -sf /usr/bin/pip3 /usr/bin/pip
          
          # 安装项目依赖 & PyInstaller
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          
          # 打包 ARM64 可执行文件
          pyinstaller --onefile --clean --noconfirm \
            --name traffic_consumer_Linux_arm64 \
            --hidden-import=engineio.async_drivers.threading \
            --add-data "templates:templates" \
            traffic_consumer.py

    - name: Upload ARM64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: traffic_consumer_Linux_arm64
        path: dist/traffic_consumer_Linux_arm64


  # 原有：构建并推送多架构 Docker 镜像（完全保留不动）
  build-and-push-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/traffic_consumer:latest
            ghcr.io/${{ github.repository_owner }}/traffic_consumer:${{ github.ref_name }}
          provenance: false

  # 原有：自动创建 Release（完全保留，路径全部兼容）
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-executables, build-executable-linux-arm64, build-and-push-docker]
    runs-on: ubuntu-latest
    steps:
    - name: Download required artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: traffic_consumer_*

    - name: List downloaded files
      run: ls -R artifacts

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/traffic_consumer_Linux/traffic_consumer_Linux
          artifacts/traffic_consumer_Linux_arm64/traffic_consumer_Linux_arm64
          artifacts/traffic_consumer_Windows/traffic_consumer_Windows.exe
          artifacts/traffic_consumer_macOS/traffic_consumer_macOS
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
