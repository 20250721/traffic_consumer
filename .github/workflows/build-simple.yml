name: Build, Release and Push Docker Image

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  # 原有：x86_64 架构 Windows/macOS/Ubuntu 可执行文件
  build-executables:
    name: Build Executable for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable
      run: |
        $separator = if ("${{ runner.os }}" -eq "Windows") {";"} else {":"}
        $addData = "--add-data `"templates${separator}templates`""
        $pyinstaller_command = "python -m PyInstaller --onefile --clean --noconfirm --name traffic_consumer_${{ runner.os }} --hidden-import=engineio.async_drivers.threading ${addData} traffic_consumer.py"
        if ("${{ runner.os }}" -eq "Windows") {
          $pyinstaller_command += " --hidden-import=win32timezone"
        }
        Invoke-Expression $pyinstaller_command
      shell: pwsh

    - name: Upload executable artifact
      uses: actions/upload-artifact@v4
      with:
        name: traffic_consumer_${{ runner.os }}
        path: dist/traffic_consumer_${{ runner.os }}${{ runner.os == 'Windows' && '.exe' || '' }}

  # 新增：Linux AArch64 (arm64) 架构 → 适配安卓/ARM 设备
  build-executable-linux-arm64:
    name: Build Executable for Linux AArch64 (Android Compatible)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    # 安装 ARM64 交叉编译工具链（用于打包安卓/Linux ARM 可执行文件）
    - name: Install AArch64 cross-compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    # 交叉编译 Linux ARM64 可执行文件（安卓直接运行）
    - name: Build Linux AArch64 executable
      run: |
        pyinstaller --onefile --clean --noconfirm \
          --name traffic_consumer_Linux_arm64 \
          --hidden-import=engineio.async_drivers.threading \
          --add-data "templates:templates" \
          --target-arch aarch64 \
          traffic_consumer.py

    - name: Upload ARM64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: traffic_consumer_Linux_arm64
        path: dist/traffic_consumer_Linux_arm64

  # 原有：构建并推送多架构 Docker 镜像到 GHCR
  build-and-push-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/traffic_consumer:latest
            ghcr.io/${{ github.repository_owner }}/traffic_consumer:${{ github.ref_name }}
          provenance: false

  # 修复版：创建 Release，解决 artifact 下载失败问题
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-executables, build-executable-linux-arm64, build-and-push-docker]
    runs-on: ubuntu-latest
    steps:
    # 核心修复：只下载程序文件，排除Docker缓存文件，解决下载重试失败
    - name: Download required artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: traffic_consumer_*  # 只下载我们编译的可执行文件
        exclude: "*.dockerbuild"     # 排除导致报错的Docker临时文件

    - name: List downloaded files
      run: ls -R artifacts

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/traffic_consumer_Linux/traffic_consumer_Linux
          artifacts/traffic_consumer_Linux_arm64/traffic_consumer_Linux_arm64
          artifacts/traffic_consumer_Windows/traffic_consumer_Windows.exe
          artifacts/traffic_consumer_macOS/traffic_consumer_macOS
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}